{% extends "base.html" %}

{% block title %}ฟอร์มลงทะเบียน - ICT12367{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center fs-5">
                แบบฟอร์มบันทึกข้อมูลประชากร
            </div>
            <div class="card-body p-4">
                <form action="#" method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="fullName" class="form-label fw-bold">ชื่อประชากร</label>
                        <input type="text" class="form-control" id="fullName" placeholder="กรุณากรอกชื่อ-นามสกุล">
                    </div>
                    
                    <div class="mb-4">
                        <label for="age" class="form-label fw-bold">อายุ</label>
                        <input type="number" class="form-control" id="age" placeholder="กรอกข้อมูลอายุเป็นตัวเลข">
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4">ลงทะเบียน</button>
                        <button type="reset" class="btn btn-danger px-4">ล้างข้อมูล</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
